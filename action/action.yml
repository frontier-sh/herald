name: 'Herald Changelog'
description: 'Send changelog entries to your Herald instance and sync them to a release'
author: 'Herald'
branding:
  icon: 'book-open'
  color: 'blue'

inputs:
  herald-url:
    description: 'URL of your Herald instance (e.g., https://herald.example.com)'
    required: true
  api-key:
    description: 'Herald API key'
    required: true
  category:
    description: 'Optional entry category (added, changed, fixed, removed, deprecated, security). Leave unset to let Herald categorize automatically — when AI features are enabled it picks the category, otherwise Herald infers one from the commit subject.'
    required: false
  title:
    description: 'Entry title (defaults to commit message or release title)'
    required: false
  content:
    description: 'Entry content in Markdown (defaults to commit messages or release body)'
    required: false
  section:
    description: 'Section name for product area grouping (e.g. Core, Desktop, API)'
    required: false
  version:
    description: 'Release version to attach this entry to (e.g. v1.2.3). Defaults to release tag on release events, or `git describe --tags --exact-match HEAD` on push events.'
    required: false
  release-title:
    description: 'Release title. Defaults to the GitHub release name on release events.'
    required: false
  release-summary:
    description: 'Release summary in Markdown. Defaults to the GitHub release body on release events.'
    required: false
  publish:
    description: 'Publish the release immediately. Defaults to true on release events, false otherwise.'
    required: false
  include-paths:
    description: 'Comma-separated git pathspecs for monorepos (e.g. apps/web/**,packages/shared/**). When set, only commits touching these paths drive the auto-collected content.'
    required: false
  include-merges:
    description: 'Include merge commits in auto-collected content (default false).'
    required: false
    default: 'false'
  commit-sha:
    description: 'Commit SHA to associate with the entry, enabling de-duplication against the "Generate from commits" flow. Defaults to the pushed/HEAD commit.'
    required: false

outputs:
  entry-ids:
    description: 'Comma-separated list of created entry IDs'
    value: ${{ steps.send.outputs.entry-ids }}
  entry-count:
    description: 'Number of entries created'
    value: ${{ steps.send.outputs.entry-count }}
  release-id:
    description: 'Herald release ID (empty when no release was attached)'
    value: ${{ steps.send.outputs.release-id }}
  release-version:
    description: 'Herald release version (empty when no release was attached)'
    value: ${{ steps.send.outputs.release-version }}
  release-url:
    description: 'Public URL of the release on Herald (empty when no release was attached)'
    value: ${{ steps.send.outputs.release-url }}

runs:
  using: 'composite'
  steps:
    - name: Send to Herald
      id: send
      shell: bash
      env:
        HERALD_URL: ${{ inputs.herald-url }}
        HERALD_API_KEY: ${{ inputs.api-key }}
        HERALD_CATEGORY: ${{ inputs.category }}
        HERALD_TITLE: ${{ inputs.title }}
        HERALD_CONTENT: ${{ inputs.content }}
        HERALD_SECTION: ${{ inputs.section }}
        HERALD_VERSION: ${{ inputs.version }}
        HERALD_RELEASE_TITLE: ${{ inputs.release-title }}
        HERALD_RELEASE_SUMMARY: ${{ inputs.release-summary }}
        HERALD_PUBLISH: ${{ inputs.publish }}
        HERALD_INCLUDE_PATHS: ${{ inputs.include-paths }}
        HERALD_INCLUDE_MERGES: ${{ inputs.include-merges }}
        HERALD_COMMIT_SHA: ${{ inputs.commit-sha }}
        EVENT_NAME: ${{ github.event_name }}
        RELEASE_NAME: ${{ github.event.release.name }}
        RELEASE_BODY: ${{ github.event.release.body }}
        RELEASE_TAG: ${{ github.event.release.tag_name }}
        EVENT_BEFORE: ${{ github.event.before }}
        EVENT_AFTER: ${{ github.event.after }}
      run: bash "${{ github.action_path }}/send.sh"
